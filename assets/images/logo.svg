<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Glass outline -->
  <path d="M 50 20 Q 30 30 30 60 L 30 280 Q 30 300 50 310 L 250 310 Q 270 300 270 280 L 270 60 Q 270 30 250 20 Q 240 15 230 18" fill="none" stroke="#FFD700" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Glass handle -->
  <path d="M 70 80 Q 40 100 40 150 Q 40 200 70 220" fill="none" stroke="#FFD700" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Decorative curl at bottom -->
  <path d="M 200 290 Q 220 300 210 320" fill="none" stroke="#FFD700" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Base line -->
  <line x1="80" y1="330" x2="220" y2="330" stroke="#000" stroke-width="3"/>
  
  <!-- Dots under glass -->
  <circle cx="95" cy="350" r="3" fill="#000"/>
  <circle cx="115" cy="350" r="3" fill="#000"/>
  <circle cx="135" cy="350" r="3" fill="#000"/>
  <circle cx="155" cy="350" r="3" fill="#000"/>
  <circle cx="175" cy="350" r="3" fill="#000"/>
  <circle cx="195" cy="350" r="3" fill="#000"/>
  <circle cx="215" cy="350" r="3" fill="#000"/>
  
  <!-- Decorative particles inside glass -->
  <circle cx="100" cy="80" r="2" fill="#999" opacity="0.6"/>
  <circle cx="150" cy="120" r="1.5" fill="#000" opacity="0.4"/>
  <circle cx="180" cy="150" r="1" fill="#999" opacity="0.5"/>
  <circle cx="120" cy="200" r="2" fill="#000" opacity="0.3"/>
  <circle cx="200" cy="240" r="1.5" fill="#999" opacity="0.4"/>
  <circle cx="90" cy="260" r="1" fill="#000" opacity="0.3"/>
  
  <!-- Yellow accent dots top right -->
  <circle cx="240" cy="60" r="4" fill="#FFD700"/>
  <circle cx="255" cy="75" r="3" fill="#FFD700"/>
  <circle cx="245" cy="90" r="3.5" fill="#FFD700"/>
  <circle cx="260" cy="100" r="2.5" fill="#FFD700"/>
  
  <!-- Yellow horizontal line -->
  <line x1="140" y1="210" x2="180" y2="210" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Watermark text (very faint) -->
  <text x="150" y="160" font-size="28" fill="#DDD" opacity="0.2" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">GOA STORIES</text>
</svg>